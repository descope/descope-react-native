name: Update release lockfiles

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

concurrency:
  group: release-lockfiles-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-lockfiles:
    if: startsWith(github.head_ref, 'release-please--')
    name: Refresh example Podfile.lock files
    runs-on: macos-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PEM }}

      - name: Checkout PR branch
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          ref: ${{ github.head_ref }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc

      - name: Cache CocoaPods
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: |
            ~/Library/Caches/CocoaPods
            **/ios/Pods
          key: ${{ runner.os }}-cocoapods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-cocoapods-

      - name: Install dependencies and regenerate Podfile.lock files
        run: yarn bootstrap
        env:
          CI: true
          NODE_AUTH_TOKEN: ${{ secrets.CI_NPM_READ_ORG }}

      - name: Commit updated Podfile.lock files
        run: |
          if git diff --quiet -- '**/Podfile.lock'; then
            echo "No Podfile.lock changes; nothing to commit."
            exit 0
          fi
          git config user.name "descope-release-bot[bot]"
          git config user.email "descope-release-bot[bot]@users.noreply.github.com"
          git add '**/Podfile.lock'
          git commit -m "chore: update example Podfile.lock files"
          git push
